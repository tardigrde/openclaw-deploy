site_name: OpenClaw Deploy
site_description: Self-hosted AI assistant infrastructure — one-command Hetzner VPS provisioning with Terraform, Ansible, and Docker
site_url: https://tardigrde.github.io/openclaw-deploy
repo_url: https://github.com/tardigrde/openclaw-deploy
repo_name: tardigrde/openclaw-deploy

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Configuration: openclaw-config.md
      - Secrets Reference: secrets.md
      - Versions: versions.md
  - Architecture:
      - Agents & Sessions: agents.md
      - Lossless Context: lossless-claw.md
      - Skills & Tools: skills.md
      - Headless Browser: headless-browser.md
      - Workspace Git Sync: workspace-git-sync.md
  - Deployment:
      - CI/CD Setup: cicd.md
      - GitOps Auto-Deploy: gitops-auto-deploy.md
      - Remote State: remote-state.md
  - Security:
      - Security Policy: security.md
      - Security Hardening: security-hardening.md
  - Addons:
      - Weather Report: addons/weather-report.md
  - About:
      - Changelog: changelog.md
      - Claude Guidelines: claude.md
