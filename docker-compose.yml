services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    init: true
    env_file: .env
    restart: unless-stopped
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      # Binds to all interfaces *inside the container* — external access is
      # restricted to 127.0.0.1 by the Docker port mapping below (line ~39)
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-0.0.0.0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      GH_TOKEN: ${GH_TOKEN:-}
      # lossless-claw: set to "0" to disable installation (enabled by default)
      INSTALL_LOSSLESS_CLAW: ${INSTALL_LOSSLESS_CLAW:-1}
      # lossless-claw: use Anthropic Haiku for context summarization (cheaper than main model)
      LCM_SUMMARY_MODEL: ${LCM_SUMMARY_MODEL:-anthropic/claude-haiku-4-5}
      # SOPS: age key for native secrets decryption
      SOPS_AGE_KEY_FILE: ${SOPS_AGE_KEY_FILE:-/home/node/.config/sops/age/keys.txt}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/home/openclaw/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/home/openclaw/.openclaw/workspace}:/home/node/.openclaw/workspace
      # SOPS: encrypted secrets file (read-only, decrypted on-the-fly by OpenClaw exec provider)
      - ${OPENCLAW_SECRETS_ENC:-/home/openclaw/openclaw/secrets/.env.enc}:/home/node/.openclaw/secrets/.env.enc:ro
      # SOPS age key for native secrets decryption (read-only)
      - ${SOPS_AGE_KEY_FILE:-/home/openclaw/.config/sops/age/keys.txt}:/home/node/.config/sops/age/keys.txt:ro
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    command: openclaw gateway --bind lan --port 18789
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
