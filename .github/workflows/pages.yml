name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install mkdocs-material

      - name: Copy root docs into docs/
        run: |
          # Strip docs/ prefix from links (files live at root, but MkDocs serves from docs/)
          sed 's|\](docs/|](|g; s|\[docs/|[|g' README.md > docs/index.md
          sed 's|\](docs/|](|g; s|\[docs/|[|g' SECURITY.md > docs/security.md

      - run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
