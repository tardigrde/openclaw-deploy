name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Install Ansible
        run: pip install "ansible-core>=2.20.4,<3" --quiet

      - name: Run make validate
        run: make validate

  terraform-test:
    name: Terraform Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Init TFLint
        working-directory: terraform/modules/hetzner-vps
        run: tflint --init

      - name: Run TFLint
        working-directory: terraform/modules/hetzner-vps
        run: tflint --recursive

      - name: Terraform Init (hetzner-vps module)
        working-directory: terraform/modules/hetzner-vps
        run: terraform init -backend=false

      - name: Run Terraform Tests (hetzner-vps)
        working-directory: terraform/modules/hetzner-vps
        run: terraform test

      - name: Terraform Init (tailscale module)
        working-directory: terraform/modules/tailscale
        run: terraform init -backend=false

      - name: Run Terraform Tests (tailscale)
        working-directory: terraform/modules/tailscale
        run: terraform test

  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          output_format: cli
          soft_fail: true
