---
# =============================================================================
# Start Play — start/restart containers
# =============================================================================
# Tags: start
#
# Starts Docker containers and prunes unused images after start.
# =============================================================================

- name: Start Docker containers
  hosts: all
  gather_facts: false

  tasks:

    - name: Stat Docker socket
      ansible.builtin.stat:
        path: /var/run/docker.sock
      register: docker_socket
      tags: [start]

    - name: Write DOCKER_SOCKET_GID to .env for compose variable substitution
      ansible.builtin.lineinfile:
        path: ~/openclaw/.env
        regexp: '^DOCKER_SOCKET_GID='
        line: "DOCKER_SOCKET_GID={{ docker_socket.stat.gid }}"
        create: true
        mode: "0600"
      tags: [start]

    - name: Start containers
      ansible.builtin.shell: |
        docker compose up -d --remove-orphans
      args:
        chdir: ~/openclaw
        executable: /bin/bash
      environment:
        DOCKER_SOCKET_GID: "{{ docker_socket.stat.gid }}"
      changed_when: true
      tags: [start]

    - name: Prune unused Docker images
      ansible.builtin.command: docker image prune -f
      changed_when: false
      tags: [start]

    # shred is used over rm to overwrite file contents before deletion.
    # Effectiveness assumes ext4 (no copy-on-write); btrfs/ZFS would bypass it.
    - name: Shred plaintext .env from VPS
      ansible.builtin.shell: |
        if [ -f ~/openclaw/.env ]; then
          shred -u ~/openclaw/.env
          echo "shredded"
        else
          echo "no .env to shred"
        fi
      args:
        executable: /bin/bash
      changed_when: true
      tags: [start]
