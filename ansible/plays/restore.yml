---
# =============================================================================
# Restore Play — restore from backup archive
# =============================================================================
# Tags: restore  (never runs by default — must be explicitly requested)
#
# Behavior:
#   Default (no extra-vars): lists available backups on VPS — no changes made.
#   With --extra-vars "execute=true backup_file=<filename>":
#     1. Validates environment (compose dir, backup file)
#     2. Stops containers
#     3. Creates a safety backup of current state (including SOPS age key)
#     4. Replaces ~/.openclaw with the backup contents
#     5. Restores Mission Control database (if matching backup exists)
#     6. Restarts containers and verifies health
#
# Usage:
#   make restore                    # dry-run: list available backups
#   make restore EXECUTE=1 BACKUP=openclaw_backup_20260101_030000.tar.gz
# =============================================================================

- name: Restore OpenClaw from backup
  hosts: all
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # Dry-run: list available backups (runs when execute is not true)
    # -------------------------------------------------------------------------

    - name: List available backups on VPS
      ansible.builtin.shell: |
        echo "=== Available backups on VPS ==="
        ls -lh ~/backups/openclaw_backup_*.tar.gz 2>/dev/null || echo "  (none found)"
        echo ""
        echo "To restore, run:"
        echo "  make restore EXECUTE=1 BACKUP=<filename>"
      args:
        executable: /bin/bash
      register: backup_list
      changed_when: false
      when: not (execute | default('false') | bool)
      tags: [never, restore]

    - name: Show available backups
      ansible.builtin.debug:
        msg: "{{ backup_list.stdout_lines }}"
      when: not (execute | default('false') | bool)
      tags: [never, restore]

    # -------------------------------------------------------------------------
    # Execute: perform actual restore (only when execute=true)
    # -------------------------------------------------------------------------

    - name: Fail if backup_file not specified
      ansible.builtin.fail:
        msg: |
          backup_file is required for restore.
          Usage: make restore EXECUTE=1 BACKUP=openclaw_backup_<timestamp>.tar.gz
      when:
        - execute | default('false') | bool
        - backup_file | default('') == ''
      tags: [never, restore]

    - name: Validate backup filename format
      ansible.builtin.assert:
        that:
          - backup_file | regex_search('^openclaw_backup_[0-9]{8}_[0-9]{6}\.tar\.gz$')
        fail_msg: "Invalid backup filename. Expected: openclaw_backup_YYYYMMDD_HHMMSS.tar.gz"
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Verify backup file exists on VPS
      ansible.builtin.stat:
        path: ~/backups/{{ backup_file | default('') }}
      register: backup_stat
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Fail if backup file not found on VPS
      ansible.builtin.fail:
        msg: "Backup file not found on VPS: ~/backups/{{ backup_file | default('') }}"
      when:
        - execute | default('false') | bool
        - not backup_stat.stat.exists
      tags: [never, restore]

    - name: Verify compose directory exists on VPS
      ansible.builtin.stat:
        path: ~/openclaw/docker-compose.yml
      register: compose_stat
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Fail if docker-compose.yml not found
      ansible.builtin.fail:
        msg: |
          docker-compose.yml not found at ~/openclaw/.
          Cannot restart containers after restore.
          Fix: ensure the IaC repo is cloned at ~/openclaw/ on the VPS.
      when:
        - execute | default('false') | bool
        - not compose_stat.stat.exists
      tags: [never, restore]

    - name: Stop containers before restore
      ansible.builtin.command:
        cmd: docker compose stop
        chdir: ~/openclaw
      changed_when: true
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Create safety backup of current state
      ansible.builtin.shell: |
        set -euo pipefail
        TIMESTAMP=$(date +"%Y%m%d_%H%M%S")

        echo "[...] Creating safety backup of ~/.openclaw..."
        tar -czf ~/backups/openclaw_pre_restore_${TIMESTAMP}.tar.gz \
          -C ~ .openclaw .config/sops 2>/dev/null \
          || tar -czf ~/backups/openclaw_pre_restore_${TIMESTAMP}.tar.gz \
          -C ~ .openclaw
        echo "[OK] Safety backup created: ~/backups/openclaw_pre_restore_${TIMESTAMP}.tar.gz"

        if docker volume inspect openclaw_mission-control-data > /dev/null 2>&1; then
          echo "[...] Creating MC DB safety backup..."
          docker run --rm \
            -v openclaw_mission-control-data:/data \
            -v ~/backups:/backup \
            alpine sh -c "apk add -q sqlite > /dev/null 2>&1 && sqlite3 /data/mission-control.db '.backup /backup/mc_pre_restore_'${TIMESTAMP}'.db'"
          echo "[OK] MC DB safety backup created: ~/backups/mc_pre_restore_${TIMESTAMP}.db"
        fi

        echo "[OK] Safety backup complete — you can restore from this if the restore fails"
      args:
        executable: /bin/bash
      when:
        - execute | default('false') | bool
      changed_when: true
      tags: [never, restore]

    - name: Remove current .openclaw directory
      ansible.builtin.file:
        path: ~/.openclaw
        state: absent
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Extract backup archive
      ansible.builtin.shell: |
        set -euo pipefail
        tar -xzf ~/backups/{{ backup_file | default('') }} -C ~
        echo "[OK] Backup extracted to ~/"
      args:
        executable: /bin/bash
      changed_when: true
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Validate restored files
      ansible.builtin.shell: |
        set -euo pipefail
        ERRORS=0

        echo "=== Validating restored files ==="

        # Check critical files
        if [[ -f ~/.openclaw/openclaw.json ]]; then
          echo "[OK] ~/.openclaw/openclaw.json"
        else
          echo "[FAIL] ~/.openclaw/openclaw.json missing"
          ERRORS=$((ERRORS + 1))
        fi

        if [[ -d ~/.openclaw/workspace ]]; then
          echo "[OK] ~/.openclaw/workspace/"
        else
          echo "[FAIL] ~/.openclaw/workspace/ missing"
          ERRORS=$((ERRORS + 1))
        fi

        if [[ -f ~/.openclaw/lcm.db ]]; then
          echo "[OK] ~/.openclaw/lcm.db ($(du -h ~/.openclaw/lcm.db | cut -f1))"
        else
          echo "[WARN] ~/.openclaw/lcm.db missing (will be created on startup)"
        fi

        if [[ -f ~/.config/sops/age/keys.txt ]]; then
          echo "[OK] ~/.config/sops/age/keys.txt (SOPS age key)"
        else
          echo "[WARN] ~/.config/sops/age/keys.txt missing — secrets decryption may fail"
        fi

        if [[ $ERRORS -gt 0 ]]; then
          echo ""
          echo "[FAIL] $ERRORS critical file(s) missing from backup"
          echo "Safety backup is available at ~/backups/openclaw_pre_restore_*.tar.gz"
          exit 1
        fi

        echo "[OK] All critical files present"
      args:
        executable: /bin/bash
      register: validate_result
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Show validation result
      ansible.builtin.debug:
        msg: "{{ validate_result.stdout_lines }}"
      when:
        - execute | default('false') | bool
        - validate_result is defined
      tags: [never, restore]

    - name: Pull latest container images
      ansible.builtin.command:
        cmd: docker compose pull --quiet
        chdir: ~/openclaw
      changed_when: false
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Derive Mission Control backup filename
      ansible.builtin.set_fact:
        mc_backup_file: "{{ (backup_file | default('')) | regex_replace('openclaw_backup_', 'mc_backup_') | regex_replace('\\.tar\\.gz$', '.db') }}"
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Check if Mission Control backup exists
      ansible.builtin.stat:
        path: ~/backups/{{ mc_backup_file | default('') }}
      register: mc_backup_stat
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Restore Mission Control database
      ansible.builtin.command:
        cmd: >
          docker run --rm
          -v openclaw_mission-control-data:/data
          -v ~/backups:/backup
          alpine sh -c
          "cp /backup/{{ mc_backup_file }} /data/mission-control.db
          && rm -f /data/mission-control.db-wal /data/mission-control.db-shm"
      changed_when: true
      when:
        - execute | default('false') | bool
        - mc_backup_stat.stat.exists
      tags: [never, restore]

    - name: Restart containers after restore
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: ~/openclaw
      changed_when: true
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Wait for gateway health endpoint
      ansible.builtin.shell: |
        set -euo pipefail
        MAX_ATTEMPTS=30
        ATTEMPT=0

        echo "[...] Waiting for gateway to become healthy..."

        while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
          ATTEMPT=$((ATTEMPT + 1))
          if curl -sf http://127.0.0.1:18789/health > /dev/null 2>&1; then
            echo "[OK] Gateway healthy after ${ATTEMPT}s"
            exit 0
          fi
          sleep 1
        done

        echo "[FAIL] Gateway did not become healthy after ${MAX_ATTEMPTS}s"
        echo "Check logs: docker compose logs openclaw-gateway --tail 50"
        exit 1
      args:
        executable: /bin/bash
      register: healthcheck_result
      when: execute | default('false') | bool
      tags: [never, restore]

    - name: Show healthcheck result
      ansible.builtin.debug:
        msg: "{{ healthcheck_result.stdout_lines }}"
      when:
        - execute | default('false') | bool
        - healthcheck_result is defined
      tags: [never, restore]

    - name: Log restore summary
      ansible.builtin.shell: |
        set -euo pipefail

        echo "=== Restore Summary ==="
        echo "Restored from: ~/backups/{{ backup_file | default('unknown') }}"
        echo "Backup size:   $(du -h ~/backups/{{ backup_file | default('') }} | cut -f1)"
        echo "Restored at:   $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
        echo ""

        echo "Containers:"
        docker compose ps --format "table {{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}" 2>/dev/null \
          || docker compose ps

        if [[ -f ~/backups/openclaw_pre_restore_*.tar.gz ]]; then
          SAFETY=$(ls -t ~/backups/openclaw_pre_restore_*.tar.gz | head -1)
          echo ""
          echo "Safety backup available at: $SAFETY"
          echo "To undo: make restore EXECUTE=1 BACKUP=$(basename "$SAFETY")"
        fi
      args:
        chdir: ~/openclaw
        executable: /bin/bash
      register: restore_summary
      when: execute | default('false') | bool
      changed_when: false
      tags: [never, restore]

    - name: Show restore summary
      ansible.builtin.debug:
        msg: "{{ restore_summary.stdout_lines }}"
      when:
        - execute | default('false') | bool
        - restore_summary is defined
      tags: [never, restore]
