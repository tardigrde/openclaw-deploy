---
# =============================================================================
# Monitor Play — Health monitoring with Telegram alerts
# =============================================================================
# Tags: monitor_enable, monitor_disable (both tagged `never` — opt-in only)
#
# Deploys a systemd timer that checks gateway health every 5 minutes and
# sends Telegram alerts when checks fail. Credentials are resolved at runtime
# from existing encrypted secrets — no plaintext tokens stored.
#
# Usage:
#   make monitor-enable   # Deploy and start the monitoring timer
#   make monitor-disable  # Stop and remove the monitoring timer
#   make monitor-status   # Show timer status
#   make monitor-test     # Trigger one check cycle manually
# =============================================================================

- name: Health Monitoring
  hosts: all
  gather_facts: false

  tasks:

    # ----- monitor_enable -----

    - name: Copy monitor script to VPS
      ansible.builtin.copy:
        src: ../../scripts/monitor.sh
        dest: ~/scripts/monitor.sh
        mode: "0750"
      tags: [never, monitor_enable]

    - name: Write monitor systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=OpenClaw Health Monitor

          [Service]
          Type=oneshot
          ExecStart=/home/openclaw/scripts/monitor.sh
          Environment=HOME=/home/openclaw
          Environment=PATH=/home/openclaw/.local/bin:/usr/local/bin:/usr/bin:/bin
        dest: ~/.config/systemd/user/openclaw-monitor.service
        mode: "0640"
      tags: [never, monitor_enable]

    - name: Write monitor systemd timer
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=OpenClaw Health Monitor Timer

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=5min
          Persistent=true

          [Install]
          WantedBy=timers.target
        dest: ~/.config/systemd/user/openclaw-monitor.timer
        mode: "0640"
      tags: [never, monitor_enable]

    - name: Enable and start monitor timer
      ansible.builtin.systemd:
        name: openclaw-monitor.timer
        scope: user
        enabled: true
        state: started
        daemon_reload: true
      tags: [never, monitor_enable]

    - name: Run test health check to verify monitoring works
      ansible.builtin.command:
        cmd: /home/openclaw/scripts/monitor.sh
      register: monitor_test_result
      changed_when: false
      failed_when: false
      tags: [never, monitor_enable]

    - name: Show test health check result
      ansible.builtin.debug:
        msg: "{{ monitor_test_result.stdout_lines | default(['Monitor script ran successfully']) }}"
      when: monitor_test_result is defined
      tags: [never, monitor_enable]

    # ----- monitor_disable -----

    - name: Stop and disable monitor timer
      ansible.builtin.systemd:
        name: openclaw-monitor.timer
        scope: user
        enabled: false
        state: stopped
        daemon_reload: true
      failed_when: false
      tags: [never, monitor_disable]

    - name: Remove monitor systemd files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - ~/.config/systemd/user/openclaw-monitor.service
        - ~/.config/systemd/user/openclaw-monitor.timer
      tags: [never, monitor_disable]

    - name: Remove monitor script
      ansible.builtin.file:
        path: ~/scripts/monitor.sh
        state: absent
      tags: [never, monitor_disable]

    - name: Remove monitor state file
      ansible.builtin.file:
        path: ~/.openclaw/monitor-state.json
        state: absent
      tags: [never, monitor_disable]
