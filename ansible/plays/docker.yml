---
# =============================================================================
# Docker Play — install Docker, copy files, and build images
# =============================================================================
# Tags: docker
#
# Installs Docker Engine + Compose plugin (if not present), copies
# docker-compose.yml and docker/ directory to the VPS, then builds images. Run with REBUILD=1.
# =============================================================================

- name: Install and configure Docker on VPS
  hosts: all
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # Docker Installation
    # -------------------------------------------------------------------------

    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false
      tags: [docker]

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Add Docker repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Add openclaw user to docker group
      ansible.builtin.user:
        name: openclaw
        groups: docker
        append: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Configure Docker daemon logging
      ansible.builtin.copy:
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        dest: /etc/docker/daemon.json
        mode: "0644"
      become: true
      when: docker_check.rc != 0
      notify: Restart Docker
      tags: [docker]

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
      become: true

- name: Build Docker images on VPS
  hosts: all
  gather_facts: false

  vars:
    docker_override_path: "{{ playbook_dir }}/../../docker-compose.override.yml"

  tasks:

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: ../../docker-compose.yml
        dest: ~/openclaw/docker-compose.yml
        mode: "0644"
      tags: [docker]

    - name: Check if docker-compose.override.yml exists locally
      ansible.builtin.stat:
        path: "{{ docker_override_path }}"
      delegate_to: localhost
      register: docker_compose_override
      tags: [docker]

    - name: Read docker-compose.override.yml content
      ansible.builtin.set_fact:
        override_content: "{{ lookup('file', docker_override_path, errors='ignore') | default('') }}"
      when: docker_compose_override.stat.exists
      tags: [docker]

    - name: Copy docker-compose.override.yml
      ansible.builtin.copy:
        src: "{{ docker_override_path }}"
        dest: ~/openclaw/docker-compose.override.yml
        mode: "0644"
      when: docker_compose_override.stat.exists
      tags: [docker]

    - name: Copy docker/ directory
      ansible.builtin.copy:
        src: ../../docker/
        dest: ~/openclaw/docker/
      tags: [docker]

    - name: Copy scripts/ directory
      ansible.builtin.copy:
        src: ../../scripts/
        dest: ~/openclaw/scripts/
      tags: [docker]

    - name: Build Docker images
      ansible.builtin.command:
        cmd: docker compose build
        chdir: ~/openclaw
      changed_when: true
      tags: [docker]
