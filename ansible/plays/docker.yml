---
# =============================================================================
# Docker Play — install Docker, copy files, and build images
# =============================================================================
# Tags: docker
#
# Installs Docker Engine + Compose plugin (if not present), copies
# docker-compose.yml and docker/ directory to the VPS, clones/updates
# Mission Control, then builds images. Run with REBUILD=1.
# =============================================================================

- name: Install and configure Docker on VPS
  hosts: all
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # Docker Installation
    # -------------------------------------------------------------------------

    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      failed_when: false
      tags: [docker]

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Add Docker repository
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Add openclaw user to docker group
      ansible.builtin.user:
        name: openclaw
        groups: docker
        append: true
      become: true
      when: docker_check.rc != 0
      tags: [docker]

    - name: Configure Docker daemon logging
      ansible.builtin.copy:
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
        dest: /etc/docker/daemon.json
        mode: "0644"
      become: true
      when: docker_check.rc != 0
      notify: Restart Docker
      tags: [docker]

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
      become: true

- name: Build Docker images on VPS
  hosts: all
  gather_facts: false

  vars:
    docker_override_path: "{{ playbook_dir }}/../../docker-compose.override.yml"

  tasks:

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: ../../docker-compose.yml
        dest: ~/openclaw/docker-compose.yml
        mode: "0644"
      tags: [docker]

    - name: Check if docker-compose.override.yml exists locally
      ansible.builtin.stat:
        path: "{{ docker_override_path }}"
      delegate_to: localhost
      register: docker_compose_override
      tags: [docker]

    - name: Read docker-compose.override.yml content
      ansible.builtin.set_fact:
        override_content: "{{ lookup('file', docker_override_path, errors='ignore') | default('') }}"
      when: docker_compose_override.stat.exists
      tags: [docker]

    - name: Check if override references mission-control
      ansible.builtin.set_fact:
        override_has_mc: "{{ docker_compose_override.stat.exists and 'mission-control' in (override_content | default('')) }}"
      tags: [docker]

    - name: Check if override references openclaw-dashboard
      ansible.builtin.set_fact:
        override_has_dashboard: "{{ docker_compose_override.stat.exists and 'openclaw-dashboard' in (override_content | default('')) }}"
      tags: [docker]

    - name: Copy docker-compose.override.yml
      ansible.builtin.copy:
        src: "{{ docker_override_path }}"
        dest: ~/openclaw/docker-compose.override.yml
        mode: "0644"
      when: docker_compose_override.stat.exists
      tags: [docker]

    - name: Copy docker/ directory
      ansible.builtin.copy:
        src: ../../docker/
        dest: ~/openclaw/docker/
      tags: [docker]

    - name: Clone or update Mission Control
      ansible.builtin.git:
        repo: https://github.com/crshdn/mission-control.git
        dest: ~/openclaw/mission-control
        update: true
        version: v2.2.0
      when: override_has_mc
      tags: [docker]

    # Pinned to commit SHA until a release tag is cut that includes the upstream Dockerfile (post-v3.0.0).
    # Once a real tag is available, update `version` to it — Renovate will track future releases from there.
    - name: Clone or update OpenClaw Dashboard
      ansible.builtin.git:
        repo: https://github.com/tugcantopaloglu/openclaw-dashboard.git
        dest: ~/openclaw/openclaw-dashboard
        update: true
        version: d6198d021886712bf9c508f1799893994bf9dfa4
      when: override_has_dashboard
      tags: [docker]

    - name: Migrate dashboard-data volume ownership (UID 1001 → 1000)
      ansible.builtin.shell: |
        if docker volume inspect openclaw_dashboard-data >/dev/null 2>&1; then
          docker run --rm -v openclaw_dashboard-data:/data alpine sh -c \
            'find /data -uid 1001 -exec chown 1000:1000 {} \; 2>/dev/null; true'
        fi
      changed_when: false
      when: override_has_dashboard
      tags: [docker]

    - name: Stat Docker socket
      ansible.builtin.stat:
        path: /var/run/docker.sock
      register: docker_socket
      tags: [docker]

    - name: Build Docker images
      ansible.builtin.command:
        cmd: docker compose build
        chdir: ~/openclaw
      environment:
        DOCKER_SOCKET_GID: "{{ docker_socket.stat.gid }}"
      changed_when: true
      tags: [docker]
