---
# =============================================================================
# Addons Play — optional addon installations
# =============================================================================
# Tags (uses `never` — only run when explicitly requested):
#   addon-weather-report  — install morning-weather cron on VPS
#   addon-acp             — set up ACP runtime with Claude Code
#
# Usage:
#   make addon-weather    # installs morning-weather cron (from Makefile.local)
#   make addon-acp        # set up ACP + Claude Code (from Makefile.local)
# =============================================================================

- name: Install optional addons
  hosts: all
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # addon-weather-report — daily weather summary sent to Telegram
    # -------------------------------------------------------------------------

    - name: Check if morning-weather.py exists locally
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../scripts/local/morning-weather.py"
      delegate_to: localhost
      register: morning_weather_script
      tags: [never, addon-weather-report]

    - name: Fail if morning-weather.py not found locally
      ansible.builtin.fail:
        msg: "scripts/local/morning-weather.py not found. Cannot install morning-weather addon."
      when: not morning_weather_script.stat.exists
      tags: [never, addon-weather-report]

    - name: Copy morning-weather script to VPS
      ansible.builtin.copy:
        src: ../../scripts/local/morning-weather.py
        dest: ~/morning-weather.py
        mode: "0755"
      tags: [never, addon-weather-report]

    - name: Create morning-weather cron wrapper
      ansible.builtin.copy:
        content: |
          #!/usr/bin/env bash
          set -a
          # shellcheck disable=SC1090
          source ~/openclaw/.env 2>/dev/null || true
          set +a
          exec python3 ~/morning-weather.py
        dest: ~/run-morning-weather.sh
        mode: "0755"
      tags: [never, addon-weather-report]

    - name: Install morning-weather cron job
      ansible.builtin.cron:
        name: morning-weather
        minute: "0"
        hour: "5"
        job: "~/run-morning-weather.sh >> ~/logs/morning-weather.log 2>&1"
      tags: [never, addon-weather-report]

    # -------------------------------------------------------------------------
    # addon-acp — set up ACP runtime with Claude Code
    #
    # Installs acpx (ACP bridge) and Claude Code CLI inside the running
    # Gateway container, then patches openclaw.json with ACP config.
    #
    # Prerequisites:
    #   - ANTHROPIC_API_KEY must be in secrets/.env
    #   - Gateway container must be running
    #
    # After running: use /acp spawn claude from Telegram, or tell Clawdy
    # "run this in Claude Code" for a natural-language handoff.
    #
    # For permanent installs across rebuilds, add acpx and claude-code
    # to the npm install line in your Dockerfile. See docs/addons/acp-claude-code.md.
    # -------------------------------------------------------------------------

    - name: Check if acpx is installed in Gateway container
      ansible.builtin.shell: |
        docker compose exec -T openclaw-gateway which acpx 2>/dev/null
      args:
        chdir: ~/openclaw
        executable: /bin/bash
      register: acpx_check
      changed_when: false
      failed_when: false
      tags: [never, addon-acp]

    - name: Install acpx and Claude Code in Gateway container
      ansible.builtin.shell: |
        docker compose exec -T openclaw-gateway npm install -g acpx@0.3.1 @anthropic-ai/claude-code@2.1.81
      args:
        chdir: ~/openclaw
        executable: /bin/bash
      when: acpx_check.rc != 0
      changed_when: true
      tags: [never, addon-acp]

    - name: Verify installations
      ansible.builtin.shell: |
        echo "acpx: $(docker compose exec -T openclaw-gateway acpx --version 2>&1)"
        echo "claude: $(docker compose exec -T openclaw-gateway claude --version 2>&1)"
      args:
        chdir: ~/openclaw
        executable: /bin/bash
      register: acp_versions
      tags: [never, addon-acp]

    - name: Show installed versions
      ansible.builtin.debug:
        msg: "{{ acp_versions.stdout_lines }}"
      tags: [never, addon-acp]

    - name: Patch openclaw.json with ACP config
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        import json, os

        config_path = os.path.expanduser("~/.openclaw/openclaw.json")

        with open(config_path) as f:
            config = json.load(f)

        # Add ACP config block
        config["acp"] = {
            "enabled": True,
            "dispatch": {"enabled": True},
            "backend": "acpx",
            "defaultAgent": "claude",
            "allowedAgents": ["claude", "codex", "pi", "opencode", "gemini", "kimi"],
            "maxConcurrentSessions": 4,
            "stream": {
                "coalesceIdleMs": 300,
                "maxChunkChars": 1200
            },
            "runtime": {
                "ttlMinutes": 120
            }
        }

        # Add acpx plugin config
        if "plugins" not in config:
            config["plugins"] = {}
        if "entries" not in config["plugins"]:
            config["plugins"]["entries"] = {}

        config["plugins"]["entries"]["acpx"] = {
            "enabled": True,
            "config": {
                "permissionMode": "approve-all",
                "nonInteractivePermissions": "deny"
            }
        }

        # Add claude to allowed agents for subagent spawning
        for agent in config.get("agents", {}).get("list", []):
            if agent.get("id") == "main":
                subagents = agent.get("subagents", {})
                allowed = subagents.get("allowAgents", [])
                if "claude" not in allowed:
                    allowed.append("claude")
                    subagents["allowAgents"] = allowed
                    agent["subagents"] = subagents
                break

        with open(config_path, "w") as f:
            json.dump(config, f, indent=2)

        print("[OK] ACP config added to openclaw.json")
        print("[OK] acpx plugin enabled")
        print("[OK] 'claude' added to allowed agents")
        PYEOF
      args:
        executable: /bin/bash
      register: acp_config_result
      changed_when: true
      tags: [never, addon-acp]

    - name: Show config result
      ansible.builtin.debug:
        msg: "{{ acp_config_result.stdout_lines }}"
      tags: [never, addon-acp]

    - name: Restart gateway container
      ansible.builtin.command:
        cmd: docker compose restart openclaw-gateway
        chdir: ~/openclaw
      changed_when: true
      tags: [never, addon-acp]

    - name: Verify ACP plugin is loaded
      ansible.builtin.shell: |
        sleep 5
        docker compose exec -T openclaw-gateway openclaw plugins list 2>/dev/null | grep -i acpx || echo "ACP plugin not detected in plugins list"
      args:
        chdir: ~/openclaw
        executable: /bin/bash
      register: acp_verify
      changed_when: false
      failed_when: false
      tags: [never, addon-acp]

    - name: Print next steps
      ansible.builtin.debug:
        msg:
          - "ACP + Claude Code setup complete!"
          - ""
          - "Usage from Telegram:"
          - "  /acp spawn claude --mode persistent --thread auto"
          - "  Or tell Clawdy: 'run this in Claude Code'"
          - ""
          - "Other harnesses available: codex, gemini, pi, opencode, kimi"
          - ""
          - "NOTE: ANTHROPIC_API_KEY must be set in secrets/.env"
          - "If not set: make secrets-edit"
          - ""
          - "For permanent installs across rebuilds, add acpx + claude-code"
          - "to the npm install line in your Dockerfile."
